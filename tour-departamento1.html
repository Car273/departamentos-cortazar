<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tour Virtual | Departamento 1</title>

    <link rel="icon" type="image/png" href="fotos/favicon.png">
    <link rel="stylesheet" href="estilos.css">

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>

        body{

            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(to bottom,#ffffff,#f3f8f3);

        }

        .contenedor{

            width:95%;
            max-width:1300px;
            margin:auto;
            padding:30px 0;

        }

        h1{

            text-align:center;
            color:#1B5E20;
            margin-bottom:10px;
            font-size:40px;

        }

        .subtitulo{

            text-align:center;
            color:#666;
            font-size:18px;
            margin-bottom:30px;

        }

        .info{

            background:white;
            border-radius:15px;
            padding:18px;
            margin-bottom:25px;
            box-shadow:0 5px 15px rgba(0,0,0,.10);
            text-align:center;

        }

        model-viewer{

            width:100%;
            height:80vh;

            background:white;

            border-radius:20px;

            box-shadow:0 15px 35px rgba(0,0,0,.15);

        }

        .botones{

            margin-top:35px;

            display:flex;

            justify-content:center;

            gap:25px;

            flex-wrap:wrap;

        }

        .boton{

            display:inline-block;

            padding:15px 35px;

            background:#2E7D32;

            color:white;

            text-decoration:none;

            border-radius:50px;

            font-size:18px;

            font-weight:bold;

            transition:.3s;

        }

        .boton:hover{

            background:#1B5E20;
            transform:translateY(-3px);

        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>🥽 Tour Virtual</h1>

    <p class="subtitulo">

        Departamento 1

    </p>

    <div class="info">

        <strong>¿Cómo recorrer el departamento?</strong>

        <br><br>

        🖱 Mantén presionado el clic izquierdo para girar el modelo.

        <br>

        🔍 Usa la rueda del mouse para acercar o alejar.

        <br>

        📱 En celulares puedes moverlo con los dedos.

    </div>

    <model-viewer

        src="modelos 3ds/departamento1.glb"

        alt="Departamento 1"

        camera-controls

        auto-rotate

        shadow-intensity="1.2"

        exposure="1.1"

        environment-image="neutral"

        loading="eager"

        ar>

    </model-viewer>

    <div class="botones">

        <a href="departamento1.html" class="boton">

            ← Regresar

        </a>

        <a href="contacto.html" class="boton">

            📞 Contactar

        </a>

    </div>

</div>

</body>

</html>
